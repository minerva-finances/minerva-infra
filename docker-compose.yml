version: '3.8'

services:
  # Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: minerva-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - minerva-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Minerva Scraper Service
  minerva-scraper:
    build:
      context: ../minerva-scraper
      dockerfile: Dockerfile
    container_name: minerva-scraper
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - HOST=0.0.0.0
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
    volumes:
      - ../minerva-scraper:/app
      - /app/node_modules
    networks:
      - minerva-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Minerva UI Service
  minerva-ui:
    build:
      context: ../minerva-ui
      dockerfile: Dockerfile
    container_name: minerva-ui
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://minerva-api:8080
    volumes:
      - ../minerva-ui:/app
      - /app/node_modules
    networks:
      - minerva-network
    depends_on:
      - minerva-api
    restart: unless-stopped

  # Minerva API Service
  minerva-api:
    build:
      context: ../minerva-api
      dockerfile: Dockerfile
    container_name: minerva-api
    ports:
      - "8080:8080"
    environment:
      # Environment variables (example values - modify as needed)
      - PORT=8080
      - ENV=development
      - GOOGLE_CLIENT_ID=your-google-client-id
      - GOOGLE_CLIENT_SECRET=your-google-client-secret
      - REDIRECT_URL=http://localhost:5173/auth/callback
      - JWT_SECRET=change-me-in-production-but-not-for-dev
      # Use external Oracle Autonomous DB on OCI
      - DATABASE_URL=oracle-xdb://user:password@host:port/service_name
      - REDIS_URL=redis://redis:6379
      - SCRAPER_URL=http://minerva-scraper:3001
    volumes:
      - ../minerva-api:/app
      - /app/go-mod-cache
      - /app/bin
    networks:
      - minerva-network
    depends_on:
      redis:
        condition: service_healthy
      minerva-scraper:
        condition: service_started
    restart: unless-stopped

  # Minerva Worker Service
  minerva-worker:
    build:
      context: ../minerva-worker
      dockerfile: Dockerfile
    container_name: minerva-worker
    environment:
      - ENV=development
      # Use external Oracle Autonomous DB on OCI
      - DATABASE_URL=oracle-xdb://user:password@host:port/service_name
      - REDIS_URL=redis://redis:6379
      - SCRAPER_URL=http://minerva-scraper:3001
      - API_URL=http://minerva-api:8080
    volumes:
      - ../minerva-worker:/app
      - /app/go-mod-cache
      - /app/bin
    networks:
      - minerva-network
    depends_on:
      redis:
        condition: service_healthy
      minerva-scraper:
        condition: service_started
      minerva-api:
        condition: service_started
    restart: unless-stopped

volumes:
  redis-data:
    driver: local

networks:
  minerva-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
